global:
  scrape_interval: 15s

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "cadvisor"
    static_configs:
      - targets: ["cadvisor:8080"]


  - job_name: "node"
    static_configs:
      - targets: ["192.168.18.13:9100"]

  - job_name: "adguard"
    static_configs:
      - targets: ["192.168.18.13:80"]

  - job_name: "glance-api"
    # This job will be enabled once the API is instrumented to expose Prometheus metrics.
    # static_configs:
    #   - targets: ['glance-custom-api:8000']
