server:
  host: 0.0.0.0
  port: 8080
  proxied: true

theme:
  # This will be the default theme
  background-color: 100 20 10
  primary-color: 40 90 40
  contrast-multiplier: 1.1
  disable-picker: false
  presets:
    gruvbox-dark:
      background-color: 0 0 16
      primary-color: 43 59 81
      positive-color: 61 66 44
      negative-color: 6 96 59
    zebra:
      light: true
      background-color: 0 0 95
      primary-color: 0 0 10
      negative-color: 0 90 50
    tucan:
      background-color: 50 1 6
      primary-color: 24 97 58
      negative-color: 209 88 54
    catpuccin-frappe:
      background-color: 229 19 23
      contrast-multiplier: 1.2
      primary-color: 222 74 74
      positive-color: 96 44 68
      negative-color: 359 68 71

pages:
  - name: Home
    hide-desktop-navigation: true
    head-widgets:
      - type: search
        hide-header: true
        autofocus: true
    columns:
      - size: small
        widgets:
          - type: to-do
            hide-header: true
          - type: clock
            hide-header: true
            hour-format: 24h
            timezones:
              - timezone: Europe/Paris
                label: Paris
              - timezone: America/Guayaquil
                label: Quito
          - type: calendar
            hide-header: true
            first-day-of-week: monday
          - type: weather
            hide-header: true
            units: metric
            hour-format: 24h
            location: Quito, Ecuador

      - size: full
        widgets:
          - type: group
            hide-header: true
            widgets:
              - type: extension
                url: http://glance-custom-api:8081/youtube/latest
                cache: 1s
                allow-potentially-dangerous-html: true
              - type: extension
                url: http://glance-custom-api:8081/github/feed
                cache: 1s
                allow-potentially-dangerous-html: true

      - size: small
        widgets:
          - type: docker-containers
            hide-header: true
            containers:
              caddy:
                name: Caddy
                description: Home server Caddy proxy manager
                icon: di:caddy
                hide: false
              glance:
                name: Glance
                description: Home server dashboard with Glance
                url: http://glance.pi
                icon: di:glance
                hide: false
              pihole:
                name: Pihole
                description: Home server Adblock with Pihole
                url: http://pihole.pi/admin
                icon: sh:piholevault
                hide: false
              grafana:
                name: Grafana
                description: Home server Grafana stats dashboard
                url: http://grafana.pi
                icon: di:grafana
                hide: false
          - type: dns-stats
            hide-header: true
            service: pihole-v6
            url: http://pihole.pi/
            username: admin
            password: ${secret:pihole-password}
            hide-top-domains: true
            hour-format: 24h
          - type: server-stats
            hide-header: true
            cache: 30s
            servers:
              - type: local
                name: Raspberry Pi
